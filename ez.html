.symptom-card{cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
.symptom-card:active{transform:scale(0.985);}
.symptom-card.is-selected{border-color:rgba(0,140,118,0.65);box-shadow:0 0 0 1px rgba(0,140,118,0.4),0 4px 16px rgba(0,140,118,0.2);}
/* 自訂勾選指示器（比原生checkbox大得多的觸控目標） */
.check-indicator{width:26px;height:26px;border-radius:50%;border:2px solid #475569;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s ease;color:transparent;font-size:13px;}
.symptom-card.is-selected .check-indicator{background:#008C76;border-color:#008C76;color:#fff;}
/* 篩選列：手機單行橫向滑動，隱藏捲軸 */
.chip-scroll{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px;}
.chip-scroll::-webkit-scrollbar{display:none;}
.chip-scroll button{flex:0 0 auto;white-space:nowrap;}
/* 吸附式篩選列與底部操作列（滾動95張卡片時不迷路） */
.sticky-filter{position:sticky;top:8px;z-index:40;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.sticky-actions{position:sticky;bottom:8px;z-index:40;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}

input,select{font-size:16px !important;}
#user-info-section input,#user-info-section select{padding-top:0.6rem;padding-bottom:0.6rem;}

.symptom-card.error-flash{border-color:#dc2626 !important;box-shadow:0 0 0 1px rgba(220,38,38,0.5),0 4px 14px rgba(220,38,38,0.25) !important;}
@media (max-width:640px){
.factor-tag{font-size:0.7rem;padding:0.15rem 0.35rem;}
#symptoms-container{gap:8px;}
.result-summary{font-size:0.9rem;}
.info-grid{grid-template-columns:repeat(2,1fr);gap:0.5rem;}
}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;}
.info-item{display:flex;justify-content:space-between;}
.severity-note{font-size:0.65rem;color:#94A3B8;margin-top:2px;}

<body class="bg-lightBg min-h-screen flex flex-col p-2 md:p-4">
<div class="max-w-5xl w-full bg-cardBg rounded-2xl shadow-elevation-2 overflow-hidden fade-in self-center">
<div class="bg-gradient-to-r from-primary to-[#006658] p-4 md:p-6 text-white text-center relative overflow-hidden">
<div class="absolute top-0 left-0 w-32 h-32 bg-white/5 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-0 right-0 w-48 h-48 bg-white/5 rounded-full translate-x-1/3 translate-y-1/3"></div>
<div class="relative z-10">
<div class="inline-flex items-center justify-center w-14 h-14 bg-white/10 backdrop-blur-sm rounded-full mb-3 pulse-subtle">
<i class="fa fa-heartbeat text-2xl text-accent"></i>
</div>
<h1 class="text-xl md:text-2xl font-bold mb-1 tracking-wide">🧬 彥彬 自檢表系統</h1>
<p class="text-white/90 text-sm md:text-base font-light">專業健康評估 · 精准對應七大健康要素</p>
</div>
</div>
<div class="p-3 md:p-5">
<div id="status" class="flex items-center justify-center py-6 text-textPrimary text-center">
<div class="text-center">
<div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-primary mb-3"></div>
<p id="status-text" class="text-base">正在初始化系統，請稍候...</p>
</div>
</div>
<div id="error-message" class="hidden bg-red-50 border border-red-100 text-red-700 px-4 py-3 rounded-xl mb-4 shadow-sm">
<div class="flex items-start">
<i class="fa fa-exclamation-circle text-red-500 mt-1 mr-2 text-lg"></i>
<div id="error-content"></div>
</div>
</div>
<div id="result-card" class="hidden bg-gradient-to-r from-secondary to-[#F0FAF8] border border-primary/15 rounded-2xl p-4 mb-4 text-center slide-up relative overflow-hidden">
<div class="absolute top-0 right-0 w-24 h-24 bg-primary/5 rounded-full translate-x-1/2 -translate-y-1/2"></div>
<div class="relative z-10">
<div id="result-main" class="text-lg md:text-xl font-bold mb-2 text-textPrimary"></div>
<div id="result-details" class="text-sm text-textSecondary space-y-1 md:space-y-1.5"></div>
<div class="w-20 h-0.5 bg-primary/20 mx-auto my-2"></div>
<p class="text-xs text-textSecondary/80"><i class="fa fa-info-circle text-primary mr-1"></i>請根據自身狀況如實填寫，系統將為您提供專業參考</p>
</div>
</div>
<div id="user-info-section" class="hidden scale-in bg-neutral rounded-2xl p-3 md:p-4 mb-4 shadow-elevation-1">
<div class="text-center mb-3">
<h2 class="text-lg md:text-xl font-bold text-textPrimary mb-1"><span class="gradient-text bg-gradient-to-r from-primary to-[#006658]">用戶基本資訊</span></h2>
<p class="text-textSecondary max-w-2xl mx-auto text-xs">請根據實際情況填寫，幫助系統精確評估</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">姓名 <span class="text-red-500">*</span></label>
<input type="text" id="user-name" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="請輸入真實姓名" required>
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">年齡 <span class="text-red-500">*</span></label>
<input type="number" id="user-age" min="0" max="120" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="請輸入年齡" required>
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">性別 <span class="text-red-500">*</span></label>
<select id="user-gender" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" required>
<option value="">請選擇性別</option>
<option value="male">男</option>
<option value="female">女</option>
</select>
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">身高 (cm)</label>
<input type="number" id="user-height" min="50" max="250" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="選填">
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">體重 (kg)</label>
<input type="number" id="user-weight" min="10" max="200" step="0.1" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="選填">
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">血壓 (mmHg)</label>
<input type="text" id="user-bp" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="選填，例：120收縮壓/80舒張壓">
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">血糖(HbA1c)</label>
<input type="number" id="user-glucose" min="3" max="15" step="0.1" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="糖化血色素">
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">職業</label>
<input type="text" id="user-job" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="選填">
</div>
</div>
<div class="text-center">
<button id="next-to-checklist" class="bg-gradient-to-r from-primary to-[#006658] hover:from-[#007A69] hover:to-[#00594D] text-white font-bold py-2 px-5 rounded-xl shadow-elevation-2 transition btn-hover transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-primary/50">

</div>
</div>
<div id="checklist-section" class="hidden scale-in">
<div class="mb-3 text-center">

</div>
</div>
<div class="sticky-filter bg-lightBg/95 border border-gray-100 rounded-2xl p-2 mb-3 shadow-elevation-2">

<button data-factor="循環" class="bg-green-600 text-white px-3 py-1.5 rounded-full text-xs font-medium hover:bg-green-700 transition btn-hover shadow-elevation-1">循環</button>
<button data-factor="毒素" class="bg-yellow-600 text-white px-3 py-1.5 rounded-full text-xs font-medium hover:bg-yellow-700 transition btn-hover shadow-elevation-1">毒素</button>

<button data-factor="免疫" class="bg-pink-600 text-white px-3 py-1.5 rounded-full text-xs font-medium hover:bg-pink-700 transition btn-hover shadow-elevation-1">免疫</button>
<button data-factor="情緒" class="bg-indigo-600 text-white px-3 py-1.5 rounded-full text-xs font-medium hover:bg-indigo-700 transition btn-hover shadow-elevation-1">情緒</button>
</div>
<div class="flex items-center justify-between px-1">
<span class="text-xs text-textSecondary"><i class="fa fa-hand-pointer-o mr-1"></i>點擊卡片即可勾選</span>
<div class="text-textPrimary text-sm font-medium">
已勾選 <span id="selected-count" class="font-bold text-primary text-base">0</span>/95

</div>
</div>

</div>
<p class="text-xs text-textSecondary/70 text-center mt-2 mb-2">提交後將生成專業參考報告，請確保信息真實有效</p>

</div>
</div>

</div>
</div>

/**
 * 計算剩餘天數（僅供💎尊爵用戶的具體日期使用）
 * 修正：「最後1天」分支改為 dayDiff<=1（原版設到期日23:59:59後Math.ceil，
 *   到期當天dayDiff必為1，dayDiff===0分支永遠走不到）
 */
const calculateRemainingDaysByDate=expiryDateStr=>{
try{
// 兼容橫槓/斜槓、補零/非補零日期（如2025/12/23、2025-12-23）
const dateReg=/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/;
if(!dateReg.test(expiryDateStr))return{displayDate:"格式錯誤",remainingDays:"格式錯誤",isExpired:true};

// 統一拆分日期部分（忽略分隔符）
const dateParts=expiryDateStr.replace(/-/g,'/').split('/').map(Number);
const [year, month, day] = dateParts;

// 構造「本地時間」的當日23:59:59（到期日全天有效，避免當天早間被誤判過期）
const expiryDate=new Date(year, month-1, day, 23, 59, 59, 999);
const now=new Date();

if(isNaN(expiryDate.getTime()))return{displayDate:"日期無效",remainingDays:"日期無效",isExpired:true};

const oneDayMs=1000*3600*24;
const timeDiff=expiryDate.getTime()-now.getTime();
const dayDiff=Math.ceil(timeDiff/oneDayMs);

// 格式化顯示日期（統一yyyy/mm/dd）
const fmtMonth=String(month).padStart(2,'0');
const fmtDay=String(day).padStart(2,'0');
const displayDate=`${year}/${fmtMonth}/${fmtDay}`;

let remainingDaysText;
let isExpired=false;
if(timeDiff < 0){ // 僅當當前時間超過到期日23:59:59，才判定為過期
  remainingDaysText="<span class='text-red-500 font-medium'>已過期</span>";
  isExpired=true;
}else if(dayDiff <= 1){ // 到期當天（未超過23:59:59），顯示「最後1天」
  remainingDaysText="<span class='text-orange-500 font-medium'>最後1天</span>";
}else if(dayDiff <= 30){ // 2~30天，高亮顯示
  remainingDaysText=`<span class='text-orange-500 font-medium'>${dayDiff} 天</span>`;
}else{ // 超過30天，正常顯示
  remainingDaysText=`${dayDiff} 天`;
}

return{displayDate, remainingDays:remainingDaysText, isExpired};
}catch(e){
console.error("計算剩餘天數失敗：",e,expiryDateStr);
return{displayDate:"計算錯誤",remainingDays:"計算錯誤",isExpired:true};
}
};

function renderSymptomCards(){

c.innerHTML='';

const rf=[],doh=durOpts.map(o=>`<option value="${o.value}">${o.label}</option>`).join(''),soh=sevOpts.map(o=>`<option value="${o.value}">${o.label}</option>`).join('');
Object.entries(fStyles).forEach(([k,st])=>s[k]==="○"&&rf.push(`<span class="factor-tag ${st.className} px-2 py-1 text-sm rounded">${st.label}</span>`));
const cd=document.createElement('div');
cd.className='symptom-card bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 rounded-xl p-3 shadow-sm card-hover';
cd.dataset.seq=s.seq;
cd.dataset.factors=Object.entries(fStyles).filter(([k])=>s[k]==="○").map(([k])=>k).join(',');
cd.style.opacity='0';
cd.style.transform='translateY(20px)';
cd.style.transition='all 0.3s cubic-bezier(0.34,1.56,0.64,1)';
cd.style.transitionDelay=`${Math.min(i*15,300)}ms`;
cd.innerHTML=`
<input type="checkbox" id="symptom-${s.seq}" class="symptom-checkbox hidden" data-seq="${s.seq}">
<div class="flex items-start justify-between gap-2">
<div class="flex-1 min-w-0">
<div class="flex items-center gap-1.5 mb-1.5 flex-wrap">
<span class="text-primary text-xs font-semibold bg-primary/10 border border-primary/30 rounded px-1.5 py-0.5 flex-shrink-0">${s.seq}</span>
<span class="symptom-name text-slate-200 font-medium text-base">${s.symptom}</span>
</div>
<div class="flex flex-wrap gap-1.5">${rf.length>0?rf.join(''):'<span class="factor-tag bg-slate-700 text-slate-400 px-2 py-1 text-sm rounded">無相關要素</span>'}</div>
</div>
<div class="check-indicator mt-0.5"><i class="fa fa-check"></i></div>
</div>

});
bindCheckboxEvents();
return true;
}catch(e){console.error("渲染症狀卡片出錯：",e);return false;}
}
// 整卡可點擊勾選（手機大觸控目標），點擊下拉選單區域不會誤觸取消
function bindCheckboxEvents(){
document.querySelectorAll('.symptom-card').forEach(cd=>{
const cb=cd.querySelector('.symptom-checkbox');
cd.addEventListener('click',function(e){
if(e.target.closest('select')||e.target.closest('.symptom-details'))return;
cb.checked=!cb.checked;
syncCardState(cd,cb);
});
});
}
function syncCardState(cd,cb){
const dt=cd.querySelector('.symptom-details');
if(cb.checked){
dt.classList.remove('hidden');
cd.classList.add('is-selected');
}else{
dt.classList.add('hidden');
cd.classList.remove('is-selected');
cd.querySelector('.duration-select').value='';
cd.querySelector('.severity-select').value='';
}

function organizeReportData(submitData){

});
const factorTotalCounts={};
Object.keys(fs).forEach(factor=>{
factorTotalCounts[factor]=fullSymptomData.filter(sym=>sym[factor]==="○").length;
});
const factorRatio={};
Object.keys(fs).forEach(factor=>{
const total=factorTotalCounts[factor];
const count=fs[factor].length;
const ratio=total>0?((count/total)*100).toFixed(1):0;
factorRatio[factor]={count,total,ratio:`${ratio}%`,ratioVal:parseFloat(ratio)};
});
const factorPercentages=Object.entries(fs).map(([key,list])=>{
const {count,ratio,ratioVal}=factorRatio[key];
return{
name:fStyles[key].label,count,total:factorTotalCounts[key],
percentage:ratio,percentageValue:ratioVal,key
};
}).filter(item=>item.count>0).sort((a,b)=>b.percentageValue-a.percentageValue);
const topPercentageFactors=factorPercentages.slice(0,2);
const ffs=Object.fromEntries(Object.entries(fs).filter(([_,f])=>f.length>0)),fui={
姓名:userBasicInfo.name||'未填寫',年齡:userBasicInfo.age?`${userBasicInfo.age}歲`:'未填寫',

};

Object.values(ffs).forEach(factorSymptoms=>{

});
const selectedTotal=allSelectedSymptoms.size;
let factorText='';
Object.entries(fs).forEach(([key,list])=>{

factorText+=`\n\n🎯【${fStyles[key].label}】(${list.length}項/總${factorTotalCounts[key]}項 | 佔比${factorRatio[key].ratio})`;
list.forEach((item,idx)=>{

factorText+=`\n     ⏱️ 持續時間：${item.duration}`;

});

function getFactorColor(factorKey){
const colorMap={
'氣血':'slate-500',
'循環':'emerald-500',
'毒素':'amber-500',
'血脂':'orange-500',
'寒濕':'violet-500',
'免疫':'pink-500',
'情緒':'indigo-500'
};
return colorMap[factorKey]||'primary';
}
async function initLIFF(){
try{
setStatus('正在初始化LINE登錄...');
await liff.init({liffId:LIFF_ID});
if(!liff.isLoggedIn()){
setStatus('請先登錄LINE賬號...');
liff.login({redirectUri:window.location.href});
return;
}
lineProfile=await liff.getProfile();
console.log("LINE用戶信息：",lineProfile);
setStatus('正在驗證授權狀態...');
const userInfo = await verifyUserFromBackend(lineProfile);
// 修正：驗證失敗時錯誤訊息已在 verifyUserFromBackend 顯示（後端的實際錯因），
//   此處不再覆蓋為固定文案，直接結束流程
if(!userInfo){
return;
}

// 過期攔截（雙保險：後端已會將過期用戶降級為普通用戶）
if(userInfo.isExpired){
  showError('您的賬號已過期，無法登錄自檢表系統，請聯繫管理員續期');
  return;
}

document.getElementById('status').classList.add('hidden');
document.getElementById('result-main').textContent=`歡迎回來，${userInfo.displayName}！`;
let expiryText = userInfo.isAdmin 
  ? `${userInfo.displayExpiryDate}（${userInfo.remainingDays}）`
  : "普通用戶（3次使用上限）";
document.getElementById('result-details').innerHTML=`
<p>用戶類型：<span class="text-primary font-medium">${userInfo.isAdmin ? "💎尊爵用戶" : "普通用戶"}</span></p>
<p>有效期：<span class="text-primary font-medium">${expiryText}</span></p>
${!userInfo.isAdmin ? `<p>剩餘使用次數：<span class="text-primary font-medium">${3 - userInfo.usageCount} 次</span></p>` : ""}
`;
document.getElementById('result-card').classList.remove('hidden');
document.getElementById('user-info-section').classList.remove('hidden');
initControlButtons();
}catch(error){
console.error("LIFF初始化失敗：",error);
if(error&&error.message&&error.message.includes('LIFF ID')){
showError('LIFF ID配置錯誤，請聯繫管理員');
}else{
showError('系統初始化失敗，請刷新頁面重試');
}
}
}
async function verifyUserFromBackend(profile){
return new Promise((resolve, reject) => {
// 修正：userId 統一改用 profile.userId
const userId = profile.userId || '';
const displayName = profile.displayName || 'LINE用戶';
if(!userId){
showError('無法取得LINE用戶身份，請重新登入後再試');
resolve(null);
return;
}
const data = {
action: 'verifyUser',
userId: userId,
displayName: displayName,
dataType: 'userVerify'
};
$.ajax({
url: GAS_URL,
dataType: 'jsonp',
jsonp: 'callback',
jsonpCallback: 'verifyCallback',
timeout: JSONP_TIMEOUT,
data: data,
success: function(resp) {
if(resp.status === "success"){
// 【核心修正】分三種情況計算有效期，
//   原版把「永久有效」丟進日期解析→regex不過→isExpired=true→永久用戶被誤攔在門外
let expiryData;
if(!resp.isAdmin){
// 普通用戶：無到期日概念，永不因日期被攔截
expiryData = { displayDate: "—", remainingDays: "—", isExpired: false };
}else if(resp.expiryDate === PERMANENT_TEXT || !resp.expiryDate){
// 永久有效💎尊爵用戶
expiryData = { displayDate: PERMANENT_TEXT, remainingDays: PERMANENT_TEXT, isExpired: false };
}else{
// 有具體到期日的💎尊爵用戶
expiryData = calculateRemainingDaysByDate(resp.expiryDate);
}
resolve({
...resp,
displayName: displayName,
remainingDays: expiryData.remainingDays,
displayExpiryDate: expiryData.displayDate,
isExpired: expiryData.isExpired
});
}else{
// 顯示後端返回的實際錯誤原因（如：次數已達上限）
showError(resp.message || "用戶驗證失敗");
resolve(null);
}
},
error: function(xhr, status, error) {
console.error("用戶驗證請求失敗：", status, error);
if(status==='timeout'){
showError('驗證超時，請檢查網絡後重新嘗試');
}else{
showError('用戶驗證請求失敗，請刷新頁面重試');
}
resolve(null);
}
});
});
}
window.verifyCallback = function(resp) {
console.log("用戶授權驗證返回：", resp);
};
window.submitCallback = function(resp) {
console.log("自檢表提交返回：", resp);
};
// 初始化執行
// 修正：head已載入LIFF SDK、jQuery、html2canvas，
//   移除原版onload內的重複動態載入（避免jQuery 3.6/3.7雙版本混用）
window.onload = function() {
if(window.liff && window.jQuery){
initLIFF();
}else if(!window.liff){
showError('LIFF SDK加載失敗，請檢查網絡後刷新頁面');
}else{
showError('jQuery加載失敗，請檢查網絡後刷新頁面');
}
};
</script>
