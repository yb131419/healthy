<style type="text/tailwindcss">
@layer utilities{.fade-in{animation:fadeIn 0.6s cubic-bezier(0.4,0,0.2,1);}.slide-up{animation:slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);}.scale-in{animation:scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}.pulse-subtle{animation:pulseSubtle 2s infinite;}.gradient-text{background-clip:text;-webkit-background-clip:text;color:transparent;}.card-hover{transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);}.btn-hover{transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);}.factor-tag{font-size:0.75rem;padding:0.2rem 0.4rem;border-radius:6px;font-weight:500;}.input-focus{@apply focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes scaleIn{from{transform:scale(0.96);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes pulseSubtle{0%,100%{opacity:1;}50%{opacity:0.8;}}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:#F1F5F9;border-radius:4px;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#94A3B8;}
body{font-feature-settings:"palt";letter-spacing:0.02em;}
/* 症狀卡：整卡可點擊，取消系統點擊高亮 */
.symptom-card{cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
.symptom-card:active{transform:scale(0.985);}
.symptom-card.is-selected{border-color:rgba(0,140,118,0.65);background:linear-gradient(135deg,#F4FBF9,#EAF6F2);box-shadow:0 0 0 1px rgba(0,140,118,0.35),0 4px 16px rgba(0,140,118,0.15);}
/* 自訂勾選指示器（比原生checkbox大得多的觸控目標） */
.check-indicator{width:26px;height:26px;border-radius:50%;border:2px solid #C4D2CC;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s ease;color:transparent;font-size:13px;}
.symptom-card.is-selected .check-indicator{background:#008C76;border-color:#008C76;color:#fff;}
/* 篩選列：手機單行橫向滑動，隱藏捲軸 */
.chip-scroll{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px;}
.chip-scroll::-webkit-scrollbar{display:none;}
.chip-scroll button{flex:0 0 auto;white-space:nowrap;}
/* 吸附式篩選列與底部操作列（滾動95張卡片時不迷路） */
.sticky-filter{position:sticky;top:8px;z-index:40;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.sticky-actions{position:sticky;bottom:8px;z-index:40;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
/* 輸入框固定16px，防止iOS聚焦時整頁自動放大 */
input,select{font-size:16px !important;}
#user-info-section input,#user-info-section select{padding-top:0.6rem;padding-bottom:0.6rem;}
/* 提交驗證未填完整時的紅框提示（用!important確保蓋過選取狀態邊框） */
.symptom-card.error-flash{border-color:#dc2626 !important;box-shadow:0 0 0 1px rgba(220,38,38,0.5),0 4px 14px rgba(220,38,38,0.25) !important;}
/* 症狀輕重三色按鈕：輕度綠/中度橙/重度紅，一眼分級 */
.sev-btn{flex:1;padding:10px 4px;border-radius:10px;font-size:14px;font-weight:700;border:1.5px solid;background:#fff;transition:all .15s ease;-webkit-tap-highlight-color:transparent;cursor:pointer;}
.sev-btn:active{transform:scale(0.96);}
.sev-btn.sev-mild{color:#059669;border-color:#A7F3D0;}
.sev-btn.sev-moderate{color:#D97706;border-color:#FDE68A;}
.sev-btn.sev-severe{color:#DC2626;border-color:#FECACA;}
.sev-btn.sev-mild.active{background:#059669;border-color:#059669;color:#fff;box-shadow:0 2px 8px rgba(5,150,105,0.35);}
.sev-btn.sev-moderate.active{background:#D97706;border-color:#D97706;color:#fff;box-shadow:0 2px 8px rgba(217,119,6,0.35);}
.sev-btn.sev-severe.active{background:#DC2626;border-color:#DC2626;color:#fff;box-shadow:0 2px 8px rgba(220,38,38,0.35);}
@media (max-width:640px){
.factor-tag{font-size:0.7rem;padding:0.15rem 0.35rem;}
#symptoms-container{gap:8px;}
.result-summary{font-size:0.9rem;}
.info-grid{grid-template-columns:repeat(2,1fr);gap:0.5rem;}
}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem;}
.info-item{display:flex;justify-content:space-between;}
.severity-note{font-size:0.65rem;color:#94A3B8;margin-top:2px;}
</style>

<div class="absolute bottom-0 right-0 w-48 h-48 bg-white/5 rounded-full translate-x-1/3 translate-y-1/3"></div>
<div class="relative z-10">

<h1 class="text-xl md:text-2xl font-bold mb-1 tracking-wide">🧬 彥彬 自檢表系統</h1>
<p class="text-white/90 text-sm md:text-base font-light">專業健康評估 · 精準對應七大健康要素</p>
</div>
</div>

</div>

</div>
</div>

<p class="text-xs text-textSecondary/80"><i class="fa fa-info-circle text-primary mr-1"></i>請根據自身狀況如實填寫，系統將為您提供專業參考</p>
</div>
</div>
<div id="user-info-section" class="hidden scale-in bg-neutral rounded-2xl p-3 md:p-4 mb-4 shadow-elevation-1">
<div class="text-center mb-3">
<div class="inline-block text-[11px] font-bold text-primary bg-primary/10 border border-primary/20 rounded-full px-2.5 py-0.5 mb-1.5">步驟 1 / 2</div>

<p class="text-textSecondary max-w-2xl mx-auto text-xs">請根據實際情況填寫，幫助系統精確評估</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">姓名 <span class="text-red-500">*</span></label>
<input type="text" id="user-name" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="請輸入真實姓名" required>
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">年齡 <span class="text-red-500">*</span></label>
<input type="number" id="user-age" min="0" max="120" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="請輸入年齡" required>
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">性別 <span class="text-red-500">*</span></label>
<select id="user-gender" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" required>
<option value="">請選擇性別</option>
<option value="male">男</option>
<option value="female">女</option>
</select>
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">身高 (cm)</label>
<input type="number" id="user-height" min="50" max="250" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="選填">
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">體重 (kg)</label>
<input type="number" id="user-weight" min="10" max="200" step="0.1" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="選填">
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">血壓 (mmHg)</label>
<input type="text" id="user-bp" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="選填，例：120收縮壓/80舒張壓">
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">血糖(HbA1c)</label>
<input type="number" id="user-glucose" min="3" max="15" step="0.1" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="糖化血色素">
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-textPrimary">職業</label>
<input type="text" id="user-job" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm input-focus bg-white" placeholder="選填">

</div>
<div class="text-center">
<button id="next-to-checklist" class="bg-gradient-to-r from-primary to-[#006658] hover:from-[#007A69] hover:to-[#00594D] text-white font-bold py-2 px-5 rounded-xl shadow-elevation-2 transition btn-hover transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-primary/50">

</div>
<p class="text-xs text-textSecondary/70 text-center mt-2 mb-2">提交後將生成專業參考報告，請確保資訊真實有效</p>

</div>
</div>

</div>

/**
 * 計算剩餘天數（僅供💎尊爵用戶的具體日期使用）
 * 修正：「最後1天」分支改為 dayDiff<=1（原版設到期日23:59:59後Math.ceil，
 *   到期當天dayDiff必為1，dayDiff===0分支永遠走不到）
 */
const calculateRemainingDaysByDate=expiryDateStr=>{
try{
// 兼容橫槓/斜槓、補零/非補零日期（如2025/12/23、2025-12-23）
const dateReg=/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/;
if(!dateReg.test(expiryDateStr))return{displayDate:"格式錯誤",remainingDays:"格式錯誤",isExpired:true};

// 統一拆分日期部分（忽略分隔符）
const dateParts=expiryDateStr.replace(/-/g,'/').split('/').map(Number);
const [year, month, day] = dateParts;

// 構造「本地時間」的當日23:59:59（到期日全天有效，避免當天早間被誤判過期）
const expiryDate=new Date(year, month-1, day, 23, 59, 59, 999);
const now=new Date();

if(isNaN(expiryDate.getTime()))return{displayDate:"日期無效",remainingDays:"日期無效",isExpired:true};

const oneDayMs=1000*3600*24;
const timeDiff=expiryDate.getTime()-now.getTime();
const dayDiff=Math.ceil(timeDiff/oneDayMs);

// 格式化顯示日期（統一yyyy/mm/dd）
const fmtMonth=String(month).padStart(2,'0');
const fmtDay=String(day).padStart(2,'0');
const displayDate=`${year}/${fmtMonth}/${fmtDay}`;

let remainingDaysText;
let isExpired=false;
if(timeDiff < 0){ // 僅當當前時間超過到期日23:59:59，才判定為過期
  remainingDaysText="<span class='text-red-500 font-medium'>已過期</span>";
  isExpired=true;
}else if(dayDiff <= 1){ // 到期當天（未超過23:59:59），顯示「最後1天」
  remainingDaysText="<span class='text-orange-500 font-medium'>最後1天</span>";
}else if(dayDiff <= 30){ // 2~30天，高亮顯示
  remainingDaysText=`<span class='text-orange-500 font-medium'>${dayDiff} 天</span>`;
}else{ // 超過30天，正常顯示
  remainingDaysText=`${dayDiff} 天`;
}

return{displayDate, remainingDays:remainingDaysText, isExpired};
}catch(e){
console.error("計算剩餘天數失敗：",e,expiryDateStr);
return{displayDate:"計算錯誤",remainingDays:"計算錯誤",isExpired:true};
}
};

// 整卡可點擊勾選（手機大觸控目標），點擊下拉選單區域不會誤觸取消
function bindCheckboxEvents(){
document.querySelectorAll('.symptom-card').forEach(cd=>{
const cb=cd.querySelector('.symptom-checkbox');
cd.addEventListener('click',function(e){
if(e.target.closest('select')||e.target.closest('.symptom-details'))return;
cb.checked=!cb.checked;
syncCardState(cd,cb);
});
// 輕/中/重三色按鈕：單選切換並寫入隱藏欄位
cd.querySelectorAll('.sev-btn').forEach(sb=>{
sb.addEventListener('click',function(ev){
ev.stopPropagation();
cd.querySelectorAll('.sev-btn').forEach(b=>b.classList.remove('active'));
this.classList.add('active');
const sv=cd.querySelector('.severity-value');
sv.value=this.dataset.value;
sv.dataset.label=this.dataset.label;
});
});
});
}
function syncCardState(cd,cb){
const dt=cd.querySelector('.symptom-details');
if(cb.checked){
dt.classList.remove('hidden');
cd.classList.add('is-selected');
}else{
dt.classList.add('hidden');
cd.classList.remove('is-selected');
cd.querySelector('.duration-select').value='';
const sv=cd.querySelector('.severity-value');
sv.value='';sv.dataset.label='';
cd.querySelectorAll('.sev-btn').forEach(b=>b.classList.remove('active'));
}
updateSelectedCount();
}
function updateSelectedCount(){
const cnt=document.querySelectorAll('.symptom-checkbox:checked').length;
const el=document.getElementById('selected-count');
el&&(el.textContent=cnt);
// 同步顯示在提交按鈕上，滾到底部就知道選了幾項
const sc=document.getElementById('submit-count');
sc&&(sc.textContent=cnt>0?`(${cnt})`:'');
return cnt;
}

function applyFilters(){
document.querySelectorAll('.symptom-card').forEach(cd=>{

function organizeReportData(submitData){
const {userBasicInfo,selectedSymptoms,displayName,submitTime}=submitData,fs={氣血:[],循環:[],毒素:[],血脂:[],寒濕:[],免疫:[],情緒:[]};
selectedSymptoms.forEach(s=>{
const os=fullSymptomData.find(ss=>ss.seq===s.seq);
os&&Object.keys(fs).forEach(f=>os[f]==="○"&&fs[f].push({name:s.symptom,duration:s.durationText,severity:s.severityText}));
});
const factorTotalCounts={};
Object.keys(fs).forEach(factor=>{
factorTotalCounts[factor]=fullSymptomData.filter(sym=>sym[factor]==="○").length;
});
const factorRatio={};
Object.keys(fs).forEach(factor=>{
const total=factorTotalCounts[factor];
const count=fs[factor].length;
const ratio=total>0?((count/total)*100).toFixed(1):0;
factorRatio[factor]={count,total,ratio:`${ratio}%`,ratioVal:parseFloat(ratio)};
});
const factorPercentages=Object.entries(fs).map(([key,list])=>{
const {count,ratio,ratioVal}=factorRatio[key];
return{
name:fStyles[key].label,count,total:factorTotalCounts[key],
percentage:ratio,percentageValue:ratioVal,key
};
}).filter(item=>item.count>0).sort((a,b)=>b.percentageValue-a.percentageValue);
const topPercentageFactors=factorPercentages.slice(0,2);
const ffs=Object.fromEntries(Object.entries(fs).filter(([_,f])=>f.length>0)),fui={
姓名:userBasicInfo.name||'未填寫',年齡:userBasicInfo.age?`${userBasicInfo.age}歲`:'未填寫',
性別:userBasicInfo.gender==='male'?'男':userBasicInfo.gender==='female'?'女':'未填寫',
身高:userBasicInfo.height?`${userBasicInfo.height}cm`:'未填寫',體重:userBasicInfo.weight?`${userBasicInfo.weight}kg`:'未填寫',
血壓:userBasicInfo.bp||'未填寫',血糖:userBasicInfo.glucose?`${userBasicInfo.glucose}%`:'未填寫',
職業:userBasicInfo.job||'未填寫',提交時間:new Date(submitTime).toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'})
};
const totalSymptomCount=fullSymptomData.length;
const allSelectedSymptoms=new Set();
Object.values(ffs).forEach(factorSymptoms=>{
factorSymptoms.forEach(symptom=>allSelectedSymptoms.add(symptom.name));
});
const selectedTotal=allSelectedSymptoms.size;
let factorText='';
Object.entries(fs).forEach(([key,list])=>{
if(list.length>0){
factorText+=`\n\n🎯【${fStyles[key].label}】(${list.length}項/總${factorTotalCounts[key]}項 | 佔比${factorRatio[key].ratio})`;
list.forEach((item,idx)=>{
factorText+=`\n  ${idx+1}. 📌${item.name}`;
factorText+=`\n     ⏱️ 持續時間：${item.duration}`;
factorText+=`\n     ⚠️ 症狀程度：${item.severity}`;
});
}
});
let st=`📋 彥彬自檢表系統 
━━━━━━━━━━━━━━━━━━━━
👤 基本資訊
  ├── 姓名：${fui.姓名}

📊 整體統計

🔖 來源：彥彬自檢表系統`;
return{formattedUserInfo:fui,factorSymptoms:ffs,summaryText:st,totalSymptomCount,selectedTotal,topFactors:topPercentageFactors,factorRatio};

// ===== 健康自檢報告模板（畫面顯示與分享圖共用同一版型，比例完全一致） =====
const shareFactorColors={
'氣血':'#64748B','循環':'#059669','毒素':'#D97706','血脂':'#EA580C','寒濕':'#7C3AED','免疫':'#DB2777','情緒':'#4F46E5'
};
// 症狀程度三色（與填寫按鈕同色系：輕度綠/中度橙/重度紅）
const sevStyles=[
{match:'重',c:'#DC2626',bg:'#FEF2F2',bd:'#FECACA'},
{match:'中',c:'#D97706',bg:'#FFFBEB',bd:'#FDE68A'},
{match:'輕',c:'#059669',bg:'#ECFDF5',bd:'#A7F3D0'}
];
function sevStyleOf(text){
for(const s of sevStyles){if((text||'').indexOf(s.match)!==-1)return s;}
return {c:'#475569',bg:'#F1F5F4',bd:'#E2EAE7'};
}

`;
}
async function handleFloatingShareClick(e){
e.stopPropagation();
const btn=e.target.closest('#floating-share-btn');
if(!window.reportData){
alert('尚未生成健康報告，無法分享');
return;
}
let host=null;
try{
btn.disabled=true;
btn.innerHTML='<i class="fa fa-spinner fa-spin"></i> 生成中';
// 確保html2canvas已就緒（head已載入，此為斷網保險）
if(!window.html2canvas){
await new Promise((resolve,reject)=>{
const script=document.createElement('script');
script.src='https://html2canvas.hertzen.com/dist/html2canvas.min.js';
script.onload=resolve;
script.onerror=reject;
document.head.appendChild(script);
});
}
// 分享圖使用與畫面報告「完全相同的模板」，比例一致；
// 固定430px寬離屏渲染＋3倍解析度轉圖，任何手機成圖都一樣清晰
host=document.createElement('div');
host.style.cssText='position:fixed;left:-10000px;top:0;pointer-events:none;';
host.innerHTML=`<div class="share-card" style="width:430px;box-sizing:border-box;padding:22px 20px 16px;background:linear-gradient(165deg,#FFFFFF 0%,#F7FBF9 60%,#F3F8F5 100%);font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;color:#1E293B;">${buildReportHTML(window.reportData)}</div>`;
document.body.appendChild(host);
await new Promise(r=>setTimeout(r,150)); // 等待字體與版面渲染穩定
const card=host.querySelector('.share-card');
const canvas=await html2canvas(card,{scale:3,useCORS:true,backgroundColor:'#FFFFFF',logging:false});
const blob=await new Promise(res=>canvas.toBlob(res,'image/png',0.92));
const dateStr=new Date().toLocaleDateString('zh-TW').replace(/\//g,'');
const file=new File([blob],`彥彬健康自檢報告_${dateStr}.png`,{type:'image/png'});
host.remove();host=null;
// 優先走系統分享（LINE可直接選好友/群組）
let shared=false;
if(navigator.share){
const shareData={title:'📋 彥彬自檢表系統 - 健康評估報告',files:[file]};
try{
if(!navigator.canShare||navigator.canShare(shareData)){
await navigator.share(shareData);
shared=true;
}
}catch(err){
if(err.name==='AbortError'){shared=true;} // 用戶自行取消分享面板，不視為錯誤
else console.error('圖片分享失敗：',err);
}
}
if(shared){
const closeBtn=document.getElementById('floating-close-btn');
if(closeBtn){closeBtn.style.display='flex';setTimeout(()=>{closeBtn.style.opacity='1';},200);}
}else{
await navigator.clipboard.writeText(window.reportData.summaryText);
alert('📋 此環境不支援圖片分享，文字報告已複製到剪貼簿，可直接貼給好友');
}
}catch(err){
console.error('分享總體錯誤：',err);
try{
await navigator.clipboard.writeText(window.reportData.summaryText);
alert('⚠️ 分享功能異常，已複製文字報告到剪貼簿，請手動貼上分享');
}catch(cbErr){
alert('⚠️ 分享功能異常，請手動截圖分享');
}
}finally{
if(host)host.remove();
btn.disabled=false;
btn.innerHTML='<i class="fa fa-share-alt mr-1"></i>分享';
}
}
async function collectSubmitData(){
// 修正：userId 統一改用 profile.userId（getDecodedIDToken需開啟openid scope，
//   未開啟時會取到null，導致後端報「缺少必要參數」）
if(!lineProfile){
lineProfile=await liff.getProfile().catch(err=>{
console.error("獲取LINE用戶資訊失敗：",err);
return null;
});
}
const selectedSymptoms=Array.from(document.querySelectorAll('.symptom-checkbox:checked')).map(cb=>{
const seq=cb.dataset.seq,cd=cb.closest('.symptom-card');
return{
seq:parseInt(seq),symptom:cd.querySelector('.symptom-name').textContent.trim(),
durationText:cd.querySelector('.duration-select option:checked').textContent,
severityText:cd.querySelector('.severity-value').dataset.label||'未選擇'
};
});
return{
action:'submitChecklist',
userId:lineProfile?.userId||'',
displayName:lineProfile?.displayName||'LINE用戶',
submitTime:new Date().toISOString(),
userName:document.getElementById('user-name').value.trim(),
userAge:document.getElementById('user-age').value.trim(),
userGender:document.getElementById('user-gender').value,
userHeight:document.getElementById('user-height').value.trim()||'',
userWeight:document.getElementById('user-weight').value.trim()||'',
userBp:document.getElementById('user-bp').value.trim()||'',
userGlucose:document.getElementById('user-glucose').value.trim()||'',
userJob:document.getElementById('user-job').value.trim()||'',
selectedSymptoms:JSON.stringify(selectedSymptoms),
dataType:'checklistSubmit'
};
}
function submitChecklistData(data,btn){
console.log("提交資料（含真實LINE名稱）：",data);
setStatus('提交中...');
document.getElementById('status').classList.remove('hidden');
$.ajax({
url:GAS_URL,
dataType:'jsonp',
jsonp:'callback',
jsonpCallback:'submitCallback',
timeout:JSONP_TIMEOUT,
data:data,
success:function(resp){
document.getElementById('status').classList.add('hidden');
hideSubmitLoading();
resetSubmitBtn(btn);
// 修正：處理後端返回error的情況（原版success分支不檢查status，
//   後端拋錯（如次數已達上限）時仍會顯示「提交成功」）
if(resp.status!=="success"){
showError(resp.message||'提交失敗，請稍後再試');
return;
}
alert('提交成功！正在生成健康報告...');
const rd=organizeReportData({
...data,
userBasicInfo:window.userBasicInfo,
selectedSymptoms:JSON.parse(data.selectedSymptoms)
});
window.reportData=rd;
renderReportSummary(rd);
document.getElementById('success-modal').classList.remove('hidden');
document.getElementById('checklist-section').classList.add('hidden');
document.getElementById('user-info-section').classList.add('hidden');
createFloatingButtons();
document.getElementById('success-modal').scrollIntoView({behavior:'smooth'});
},
error:function(xhr,status,error){
document.getElementById('status').classList.add('hidden');
hideSubmitLoading();
resetSubmitBtn(btn);
console.error("提交失敗：",status,error);
if(status==='timeout'){
showError('提交超時，請檢查網路後重新嘗試');
}else{
showError(`提交失敗：${error||'未知網路錯誤'}`);
}
}
});
}
function renderReportSummary(reportData){
try{
const summaryContent=document.getElementById('summary-content');
if(!summaryContent)return;
// 與分享圖共用buildReportHTML同一模板，畫面所見＝分享所得，比例完全一致
summaryContent.innerHTML=buildReportHTML(reportData);
}catch(e){
console.error("渲染報告摘要出錯：",e);
hideSubmitLoading();
showError('報告生成失敗，請重新提交');
}
}
async function initLIFF(){
try{
setStatus('正在初始化LINE登入...');
await liff.init({liffId:LIFF_ID});
if(!liff.isLoggedIn()){
setStatus('請先登入LINE帳號...');
liff.login({redirectUri:window.location.href});
return;
}
lineProfile=await liff.getProfile();
console.log("LINE用戶資訊：",lineProfile);
setStatus('正在驗證授權狀態...');
const userInfo = await verifyUserFromBackend(lineProfile);
// 修正：驗證失敗時錯誤訊息已在 verifyUserFromBackend 顯示（後端的實際錯因），
//   此處不再覆蓋為固定文案，直接結束流程
if(!userInfo){
return;
}

// 過期攔截（雙保險：後端已會將過期用戶降級為普通用戶）
if(userInfo.isExpired){
  showError('您的帳號已過期，無法登入自檢表系統，請聯繫管理員續期');
  return;
}

document.getElementById('status').classList.add('hidden');
document.getElementById('result-main').textContent=`歡迎回來，${userInfo.displayName}！`;
let expiryText = userInfo.isAdmin 
  ? `${userInfo.displayExpiryDate}（${userInfo.remainingDays}）`
  : "普通用戶（3次使用上限）";
document.getElementById('result-details').innerHTML=`
<p>用戶類型：<span class="text-primary font-medium">${userInfo.isAdmin ? "💎尊爵用戶" : "普通用戶"}</span></p>
<p>有效期：<span class="text-primary font-medium">${expiryText}</span></p>
${!userInfo.isAdmin ? `<p>剩餘使用次數：<span class="text-primary font-medium">${3 - userInfo.usageCount} 次</span></p>` : ""}
`;
document.getElementById('result-card').classList.remove('hidden');
document.getElementById('user-info-section').classList.remove('hidden');
initControlButtons();
}catch(error){
console.error("LIFF初始化失敗：",error);
if(error&&error.message&&error.message.includes('LIFF ID')){
showError('LIFF ID配置錯誤，請聯繫管理員');
}else{
showError('系統初始化失敗，請重新整理頁面重試');
}
}
}
async function verifyUserFromBackend(profile){
return new Promise((resolve, reject) => {
// 修正：userId 統一改用 profile.userId
const userId = profile.userId || '';
const displayName = profile.displayName || 'LINE用戶';
if(!userId){
showError('無法取得LINE用戶身份，請重新登入後再試');
resolve(null);
return;
}
const data = {
action: 'verifyUser',
userId: userId,
displayName: displayName,
dataType: 'userVerify'
};
$.ajax({
url: GAS_URL,
dataType: 'jsonp',
jsonp: 'callback',
jsonpCallback: 'verifyCallback',
timeout: JSONP_TIMEOUT,
data: data,
success: function(resp) {
if(resp.status === "success"){
// 【核心修正】分三種情況計算有效期，
//   原版把「永久有效」丟進日期解析→regex不過→isExpired=true→永久用戶被誤攔在門外
let expiryData;
if(!resp.isAdmin){
// 普通用戶：無到期日概念，永不因日期被攔截
expiryData = { displayDate: "—", remainingDays: "—", isExpired: false };
}else if(resp.expiryDate === PERMANENT_TEXT || !resp.expiryDate){
// 永久有效💎尊爵用戶
expiryData = { displayDate: PERMANENT_TEXT, remainingDays: PERMANENT_TEXT, isExpired: false };
}else{
// 有具體到期日的💎尊爵用戶
expiryData = calculateRemainingDaysByDate(resp.expiryDate);
}
resolve({
...resp,
displayName: displayName,
remainingDays: expiryData.remainingDays,
displayExpiryDate: expiryData.displayDate,
isExpired: expiryData.isExpired
});
}else{
// 顯示後端返回的實際錯誤原因（如：次數已達上限）
showError(resp.message || "用戶驗證失敗");
resolve(null);
}
},
error: function(xhr, status, error) {
console.error("用戶驗證請求失敗：", status, error);
if(status==='timeout'){
showError('驗證超時，請檢查網路後重新嘗試');
}else{
showError('用戶驗證請求失敗，請重新整理頁面重試');
}
resolve(null);
}
});
});
}
window.verifyCallback = function(resp) {
console.log("用戶授權驗證返回：", resp);
};
window.submitCallback = function(resp) {
console.log("自檢表提交返回：", resp);
};

}
};
